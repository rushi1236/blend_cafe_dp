# ============================================================================
# PART I: SYSTEM OVERVIEW & ARCHITECTURE
# ============================================================================

system_overview:
  description: |
    This project builds a Dynamic Pricing Recommendation Engine for Blend Café,
    Deccan, Pune. The core problem is that Blend Café uses entirely static pricing
    — every item has one fixed price regardless of time, day, weather, or demand.
    This leaves significant revenue on the table during peak hours and fails to
    stimulate demand during slow periods.

    The system analyses 3 months of simulated transaction data (May–July 2024,
    covering Pune summer through full monsoon season) using classical Excel
    analysis, statistical data science, and classical ML models to produce
    item-level price recommendations per time slot and day type.

    DESIGN PHILOSOPHY:
    Every technique used must be explainable to a non-technical café owner.
    No black-box deep learning. Every price recommendation must trace back to
    a specific data pattern — weather correlation, time-slot elasticity,
    segment demand — that the café can verify and trust.

    KEY INSIGHT DRIVING THE PROJECT:
    Blend Café's own menu already encodes time-slot logic (soups only at
    12:00–15:30, breakfast only 8:00–11:30). This project extends that logic
    dynamically — not just what is available when, but what price maximises
    revenue given real-time demand signals like weather and day type.

  architectural_diagram: |
    ┌──────────────────────────────────────────────────────────────────────┐
    │                    DATA LAYER  (data/)                               │
    │                                                                      │
    │  ┌─────────────────────────────────────────────────────────────┐    │
    │  │  data/obs/                                                  │    │
    │  │  BlendCafe_DynamicPricing_Data.xlsx                        │    │
    │  │  ├── Sheet: Raw_Transactions  (3,818 rows × 21 columns)    │    │
    │  │  ├── Sheet: Daily_Summary     (92 rows + monthly totals)   │    │
    │  │  ├── Sheet: Item_Master       (200 items × 8 columns)      │    │
    │  │  └── Sheet: README            (column definitions)         │    │
    │  └─────────────────────────────────────────────────────────────┘    │
    └──────────────────────────┬───────────────────────────────────────────┘
                               ↓  01_data_loader.py reads Excel
    ┌──────────────────────────────────────────────────────────────────────┐
    │         ANALYSIS PIPELINE  (scripts/data_analysis/)                 │
    │                                                                      │
    │  01_data_loader.py  →  02_abc_analysis.py  →  03_pivot_heatmap.py  │
    │         ↓                      ↓                      ↓             │
    │  04_correlation_analysis.py  →  05_price_elasticity.py             │
    │         ↓                                ↓                          │
    │  06_pareto_analysis.py  →  07_time_series.py                        │
    │                                  ↓                                  │
    │                       08_demand_segmentation.py                     │
    │                                                                      │
    │  OUTPUTS → data/data_analysis/  (7 processed CSVs + charts)        │
    └──────────────────────────┬───────────────────────────────────────────┘
                               ↓  feature_engineering reads data_analysis/ CSVs
                               ↓  + obs/Item_Master (static reference only)
    ┌──────────────────────────────────────────────────────────────────────┐
    │             ML PIPELINE  (scripts/models/)                           │
    │                                                                      │
    │  01_feature_engineering.py                                           │
    │       ↓  (feature matrix: encoded categoricals + demand signals)    │
    │  02_demand_forecast.py                                               │
    │       ├── Model A: LinearRegression    (baseline — intentional)     │
    │       └── Model B: RandomForestRegressor  (primary model)           │
    │       ↓  (Failure Story 2: overfitting caught here)                 │
    │  03_price_recommender.py                                             │
    │       ├── ML demand prediction per item-slot-day combination        │
    │       ├── Elasticity-based price adjustment (from Phase 2)          │
    │       └── Price floor constraint  (Failure Story 3)                 │
    │       ↓                                                              │
    │  04_revenue_comparison.py                                            │
    │       └── Static pricing revenue vs Dynamic pricing revenue → uplift%│
    │  05_model_evaluation.py                                              │
    │       └── MAE, RMSE, cross-validation, feature importance chart     │
    │                                                                      │
    │  OUTPUTS → data/models/  (.pkl files + price_recommendations.csv)  │
    └──────────────────────────┬───────────────────────────────────────────┘
                               ↓
    ┌──────────────────────────────────────────────────────────────────────┐
    │             FINAL DELIVERABLE  (data/reports/)                       │
    │                                                                      │
    │  DynamicPricing_Report_BlendCafe.xlsx                               │
    │  ├── Tab 1: Executive Summary  (headline uplift %, key findings)    │
    │  ├── Tab 2: Item Price Recommendations (per slot, per day type)     │
    │  ├── Tab 3: Weather Pricing Rules (trigger-based adjustments)       │
    │  ├── Tab 4: Top Elastic vs Inelastic Items (café owner action list) │
    │  └── Tab 5: Model Accuracy Summary (MAE, RMSE, uplift validation)  │
    └──────────────────────────────────────────────────────────────────────┘

  data_flow:
    phase_1_to_phase_2:
      trigger: "01_data_loader.py reads Excel, cleans, outputs CSVs"
      key_transformation: "Excel sheets → typed pandas DataFrames → cleaned CSVs"
      output: "processed_transactions.csv, daily_aggregated.csv"

    phase_2_internal:
      trigger: "Each analysis script reads from data/data_analysis/"
      key_transformations:
        - "ABC classification adds Revenue_Class column (A/B/C)"
        - "Elasticity script adds Elasticity_Coefficient per item-weather pair"
        - "Demand segmentation adds Demand_Class to item-slot matrix"
      output: "abc_classified.csv, elasticity_coefficients.csv, demand_segments.csv"

    phase_2_to_phase_3:
      trigger: "01_feature_engineering.py reads all Phase 2 outputs"
      key_transformation: "Categorical encoding + demand signals → numeric feature matrix"
      note: "models/ scripts NEVER read raw Excel directly (except Item_Master lookup)"
      output: "feature_matrix.csv"

    phase_3_to_report:
      trigger: "04_revenue_comparison.py + manual report compilation"
      key_transformation: "price_recommendations.csv → formatted Excel report"
      output: "DynamicPricing_Report_BlendCafe.xlsx"

  critical_design_decisions:
    separation_of_concerns:
      rationale: |
        Scripts in data_analysis/ never do modelling. Scripts in models/ never
        do raw data cleaning. This means if simulation assumptions change, only
        data_analysis scripts need updating — models/ is insulated.
      implementation:
        data_analysis: "Reads obs/, writes data/data_analysis/"
        models: "Reads data/data_analysis/ + obs/Item_Master (reference only)"

    classical_ml_only:
      rationale: |
        Café owner must be able to understand and trust recommendations.
        A Random Forest with feature importances is explainable.
        A neural network is not. Also — with 3,818 rows and 200 items,
        deep learning would overfit and is unjustifiable architecturally.
      implementation:
        baseline: "LinearRegression — simple, always explainable"
        primary: "RandomForestRegressor — handles non-linearity, weather × day interactions"
        no_deep_learning: "PyTorch / Keras explicitly excluded"

    price_floor_constraint:
      rationale: |
        Pure ML output suggested dropping Fondue (₹695) to ₹420 during slow
        Monday afternoons. This destroys premium brand perception. ML models
        optimise revenue, not brand. Business constraint must override model output.
      implementation:
        rule: "No item's recommended price drops below 85% of Base_Price_₹"
        premium_flag: "Items in Premium tier additionally flagged for human review"


