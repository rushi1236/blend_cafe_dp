# ============================================================================
# PART III: DATASET SCHEMA
# ============================================================================

dataset_schema:
  source_file: "data/obs/BlendCafe_DynamicPricing_Data.xlsx"
  total_rows: 3818
  total_columns: 21
  date_range: "01-May-2024 to 31-Jul-2024"
  simulation_seed: 42

  sheets:
    Raw_Transactions:
      purpose: "Primary analysis dataset — one row per item ordered"
      rows: 3818
      columns: 21
      used_in_phases: [1, 2, 3]

    Daily_Summary:
      purpose: "Aggregated daily metrics — footfall, revenue, weather, OOS events"
      rows: 92
      used_in_phases: [1, 2]

    Item_Master:
      purpose: "Static reference — all 200 menu items with pricing and segment metadata"
      rows: 200
      used_in_phases: [1, 3]
      note: "Phase 3 models/ scripts read this directly as reference lookup"

    README:
      purpose: "Column definitions, weather logic, failure story notes"
      used_in_phases: []

  columns:
    Transaction_ID:
      type: "Integer"
      description: "Unique identifier for each item-level order row"
      used_in: "Row identification, deduplication"

    Date:
      type: "String (DD-MMM-YYYY)"
      description: "Calendar date of order"
      used_in: "Phase 1 pivot, Phase 2 time series, Phase 3 feature"
      phase_3_encoding: "Converted to ordinal day number for ML"

    Month:
      type: "Categorical (May / June / July)"
      description: "Month name — used as seasonal proxy"
      used_in: "Phase 1 monthly comparison, Phase 3 ML feature"
      phase_3_encoding: "Label encoded: May=0, June=1, July=2"

    Day_of_Week:
      type: "Categorical (Monday–Sunday)"
      description: "Day name — core demand driver"
      used_in: "Phase 1 pivot heatmap, Phase 3 ML feature"
      phase_3_encoding: "Label encoded: Monday=0 … Sunday=6"

    Is_Weekend:
      type: "Binary (Yes / No)"
      description: "Weekend flag — binary version of Day_of_Week for model simplicity"
      used_in: "Phase 1 quick filter, Phase 3 ML feature"
      phase_3_encoding: "Binary: Yes=1, No=0"

    Time_of_Order:
      type: "String (HH:MM, 24-hour)"
      description: "Exact order time — used for granular time analysis"
      used_in: "Phase 1 peak hour detection"
      phase_3_encoding: "Converted to integer minute-of-day (0–1439)"

    Time_Slot:
      type: "Categorical (Morning / Afternoon / Evening / Dinner)"
      description: "Bucketed slot aligned with Blend Café's own menu timing windows"
      slot_windows:
        Morning: "08:00–11:30"
        Afternoon: "11:30–15:30"
        Evening: "15:30–19:00"
        Dinner: "19:00–22:00"
      used_in: "Phase 1 pivot, Phase 2 elasticity, Phase 3 primary ML feature"
      phase_3_encoding: "One-hot encoded (4 binary columns)"

    Weather:
      type: "Categorical (Dry Day / Light Drizzle / Heavy Rain / Clear After Rain)"
      description: "Weather state — strongest demand signal in monsoon months"
      weather_business_logic:
        Dry_Day: "May dominant. Cold beverages spike. Hot drinks drop."
        Light_Drizzle: "Moderate rain. Transition state. Comfort food uptick."
        Heavy_Rain: "Footfall -48%. Soups, chai, ramen, hot chocolate surge."
        Clear_After_Rain: "Post-rain surge. Footfall +28%. Premium items sell."
      used_in: "Phase 2 correlation, Phase 3 most important ML feature"
      phase_3_encoding: "One-hot encoded (4 binary columns)"

    Temperature_°C:
      type: "Float"
      description: "Ambient temperature — numeric companion to Weather categorical"
      range: "19°C (July Heavy Rain) to 40°C (May Dry Day)"
      used_in: "Phase 2 correlation with cold/hot beverage sales, Phase 3 ML feature"

    Academic_Period:
      type: "Categorical (Summer Vacation / Pre-Semester / New Semester)"
      description: "College calendar state — critical for Deccan Pune café footfall"
      mapping:
        Summer_Vacation: "May — leisure visits, late mornings, smoothie bowl crowd"
        Pre_Semester: "June — transitioning, moderate footfall"
        New_Semester: "July — college crowd returns to Deccan strong"
      used_in: "Phase 2 segmentation, Phase 3 ML feature"
      phase_3_encoding: "Label encoded: Summer Vacation=0, Pre-Semester=1, New Semester=2"

    Customer_Segment:
      type: "Categorical (College / Professional / Couple-Group / Family)"
      description: "Inferred customer type — determines ordering behaviour"
      segment_patterns:
        College: "Price sensitive, afternoon/evening, share plates, burgers, cold brews"
        Professional: "Morning heavy, quick orders, eggs, coffee, breakfast items"
        Couple_Group: "Friday–Saturday dinner, premium items, fondue, full meals"
        Family: "Sunday brunch, wholesome breakfast, smoothie bowls, shakes"
      used_in: "Phase 2 demand segmentation, Phase 3 ML feature"
      phase_3_encoding: "One-hot encoded (4 binary columns)"

    Table_No:
      type: "Integer (1–20)"
      description: "Table number — footfall and occupancy proxy"
      used_in: "Phase 1 occupancy analysis"

    Order_Type:
      type: "Categorical (Dine-in / Takeaway)"
      description: "Service mode — 88% dine-in, 12% takeaway in simulation"
      used_in: "Phase 1 revenue split"

    Item_Name:
      type: "String"
      description: "Full menu item name — 200 unique items"
      used_in: "All phases — primary dimension for price recommendations"
      phase_3_encoding: "Not encoded directly — model trained at category + tier level"

    Category:
      type: "Categorical (24 categories)"
      description: "Menu section — Pancakes & Waffwich, Pasta, Pizza, etc."
      used_in: "Phase 1 ABC by category, Phase 3 ML feature"
      phase_3_encoding: "Label encoded (24 classes)"

    Is_Vegetarian:
      type: "Binary (Yes / No)"
      description: "Veg vs non-veg flag — demand pattern differs"
      used_in: "Phase 1 veg/nonveg split, Phase 2 segment correlation"
      phase_3_encoding: "Binary: Yes=1, No=0"

    Price_Tier:
      type: "Categorical (Budget / Mid-range / Premium)"
      description: "Price bracket — critical for Failure Story 3 (price floor constraint)"
      thresholds:
        Budget: "Base price < ₹200"
        Mid_range: "₹200 ≤ Base price ≤ ₹400"
        Premium: "Base price > ₹400"
      used_in: "Phase 1 ABC, Phase 2 elasticity segmentation, Phase 3 constraint layer"
      phase_3_encoding: "Label encoded: Budget=0, Mid-range=1, Premium=2"

    Base_Price_₹:
      type: "Integer (₹)"
      description: "Static menu price in Indian Rupees — the variable Phase 3 optimises"
      range: "₹35 (Khari) to ₹695 (Jalapeño Cheese Fondue)"
      used_in: "All phases — this is the target variable for price recommendation"

    Quantity_Units:
      type: "Integer"
      description: "Units ordered in this transaction row"
      distribution: "80% = 1 unit, 20% = 2 units"
      used_in: "Phase 2 demand calculation, Phase 3 target variable (demand proxy)"

    Daily_Footfall_Customers:
      type: "Integer"
      description: "Total customers that day — demand context for each transaction"
      range: "18 (Heavy Rain Monday) to 158 (Clear After Rain Saturday)"
      used_in: "Phase 2 correlation analysis, Phase 3 ML feature"

    Revenue_₹:
      type: "Integer (₹)"
      description: "Transaction revenue = Base_Price_₹ × Quantity_Units"
      note: "Computed column — always verify as Base_Price × Quantity"
      used_in: "Phase 1 ABC, Phase 1 pivot revenue totals, Phase 3 uplift comparison"


# ============================================================================
# PART IV: SIMULATION ASSUMPTIONS
# ============================================================================

simulation_assumptions:
  purpose: |
    All transaction data is simulated. When asked in interviews, the answer is:
    "Blend Café does not have a POS system with digital transaction logs. I
    simulated realistic data based on Pune café market research, the café's own
    menu timing windows, and Pune monsoon weather patterns. The simulation was
    designed to produce non-obvious patterns for meaningful ML analysis."

  seed: 42
  random_library: "numpy.random + Python random"

  weather_distributions:
    May:
      Dry_Day: "70%"
      Light_Drizzle: "15%"
      Heavy_Rain: "5%"
      Clear_After_Rain: "10%"
      temperature_range: "24°C – 40°C"
      rationale: "Pune summer peak. Afternoons brutal. Evenings prime."

    June:
      Dry_Day: "25%"
      Light_Drizzle: "35%"
      Heavy_Rain: "25%"
      Clear_After_Rain: "15%"
      temperature_range: "21°C – 32°C"
      rationale: "Pre-monsoon transition. Humidity. Unpredictable."

    July:
      Dry_Day: "8%"
      Light_Drizzle: "30%"
      Heavy_Rain: "37%"
      Clear_After_Rain: "25%"
      temperature_range: "19°C – 26°C"
      rationale: "Full Pune monsoon. Beautiful evenings after rain."

  footfall_multipliers:
    base_weekday_footfall:
      Monday: 52
      Tuesday: 48
      Wednesday: 58
      Thursday: 63
      Friday: 88
      Saturday: 132
      Sunday: 118
    weather_multipliers:
      Dry_Day: 1.00
      Light_Drizzle: 0.82
      Heavy_Rain: 0.52
      Clear_After_Rain: 1.28
    academic_multipliers:
      Summer_Vacation: 0.92
      Pre_Semester: 0.87
      New_Semester: 1.06
    daily_noise: "±18% uniform random variation"

  academic_calendar:
    Summer_Vacation_May: "Leisure visits. Late morning crowd. Smoothie bowls peak."
    Pre_Semester_June: "College students returning. Moderate. Transitioning."
    New_Semester_July: |
      New academic year starts. Fresh first-years discover Deccan cafés.
      Senior students reunite. College crowd surges back strongly.
      Afternoon and evening slots become college-dominated.

  item_demand_logic:
    weather_sensitive_items:
      - "Masala Chai — 2.0x on Heavy Rain"
      - "Tomato & Bell Pepper Soup — 2.0x on Heavy Rain"
      - "Ramen Bowls — 1.9x on Heavy Rain, 0.4x on Dry Day"
      - "Iced Café Latte — 1.7x on Dry Day, 0.35x on Heavy Rain"
      - "Watermelon Mojito — 1.6x on Dry Day, 0.45x on Heavy Rain"
      - "Marshmallow Hot Chocolate — 1.9x on Heavy Rain"
      - "Cold Press Juices — 1.5–1.6x on Dry Day, 0.4x on Heavy Rain"
    slot_dominant_items:
      Morning: "Pancakes, Wholesome Breakfast, Hot Brews, Smoothie Bowls"
      Afternoon: "Sandwiches, Burgers, Pasta, Cold Brews, Salads"
      Evening: "Beverages dominate, Sandwiches, Grilled Cheese"
      Dinner: "Full Meals, Share-A-Plate, Pizza, Fondue, Desserts, Ramen"
    premium_items_behavior:
      Fondue: "Friday–Sunday dinner almost exclusively. Near zero weekday."
      Prawns: "Weekend dinner only. Couple-Group segment only."
      Full_Meals: "Dinner only. Couple-Group + Professional."

  out_of_stock_events:
    count: 8
    duration: "2–4 consecutive days each"
    items: "Random premium items (Base_Price > ₹300)"
    visibility: "Recorded in Daily_Summary — Out_of_Stock_Items column"
    purpose: "Failure Story 1 ingredient — assumption about item availability"


# ============================================================================
# PART V: PHASE 1 — EXCEL ANALYSIS
# ============================================================================

phase_1_excel_analysis:
  duration: "Week 1–2"
  objective: "Understand the data through Excel — before writing a single line of Python"
  tool: "Microsoft Excel / LibreOffice Calc"
  input: "data/obs/BlendCafe_DynamicPricing_Data.xlsx → Raw_Transactions sheet"

  techniques:

    descriptive_statistics:
      what: "Mean, median, standard deviation of Revenue_₹ and Quantity_Units"
      where: "Excel: Data Analysis Toolpak"
      output: "Baseline distribution understanding per category"
      insight: "Revenue distribution is right-skewed — Premium items create long tail"

    pivot_table_1_revenue_by_slot_and_day:
      axes: "Rows: Time_Slot | Columns: Day_of_Week | Values: SUM(Revenue_₹)"
      output: "Revenue heatmap — which slot × day is hottest"
      insight: "Saturday Dinner slot is highest revenue. Monday Afternoon is lowest."
      excel_feature: "Conditional formatting → color gradient heatmap"

    pivot_table_2_category_revenue:
      axes: "Rows: Category | Values: SUM(Revenue_₹), COUNT(Transaction_ID)"
      output: "Revenue contribution per menu category"
      insight: "Hot Brews + Cold Brews together are highest transaction volume category"

    pivot_table_3_weather_vs_category:
      axes: "Rows: Category | Columns: Weather | Values: SUM(Quantity_Units)"
      output: "Weather impact visible at category level"
      insight: "Soup category 3.1x higher quantity on Heavy Rain vs Dry Day"

    abc_analysis:
      what: |
        ABC Classification — categorise 200 items by cumulative revenue contribution.
        Class A: top items contributing 0–70% of total revenue
        Class B: next items contributing 70–90% of total revenue
        Class C: remaining items contributing 90–100% of total revenue
      excel_implementation:
        step_1: "SUMIF revenue per item → sort descending"
        step_2: "Cumulative % column = running sum / grand total"
        step_3: "IF(cumulative%<=0.70, 'A', IF(cumulative%<=0.90, 'B', 'C'))"
      output: "data/data_analysis/abc_classified.csv"
      insight: "~38 items (19%) are Class A — driving ~68% of total revenue"
      business_use: "Focus dynamic pricing effort on Class A items first"

    average_order_value:
      formula: "=AVERAGEIF(Day_of_Week, 'Saturday', Revenue_₹)"
      purpose: "Compare AOV across day types and slots"
      insight: "Saturday Dinner AOV is 2.3x Monday Afternoon AOV"

    contribution_analysis:
      what: "Which items appear most frequently in same-table orders"
      excel_feature: "COUNTIFS across Table_No and Date"
      insight: "Fondue almost always ordered alongside Share-A-Plate item"

    formulas_used:
      - "SUMIF, SUMIFS — conditional revenue aggregation"
      - "AVERAGEIF, AVERAGEIFS — conditional mean calculation"
      - "COUNTIFS — multi-condition frequency count"
      - "VLOOKUP — joining Item_Master to transaction data"
      - "IF, nested IF — ABC classification logic"
      - "Pivot Tables — all aggregations above"
      - "Conditional Formatting — heatmap visualization"

  phase_1_key_findings:
    - "Saturday Dinner is the single highest revenue slot-day combination"
    - "Monday + Tuesday Afternoon are consistently lowest — prime discount opportunity"
    - "Hot Brews are ordered in all 4 time slots but cold beverages only in 2"
    - "38 Class A items drive 68% of total revenue — focus list identified"
    - "Sunday brunch pattern differs significantly from Saturday — different crowd"


# ============================================================================
# PART VI: PHASE 2 — DATA SCIENCE / STATISTICAL ANALYSIS
# ============================================================================

phase_2_data_science:
  duration: "Week 3–4"
  objective: "Find statistical relationships that will power the ML pricing model"
  tools: "Python 3.11 — pandas, scipy, statsmodels, seaborn, matplotlib"
  input: "data/data_analysis/ outputs from Phase 1 scripts"

  techniques:

    correlation_analysis:
      script: "04_correlation_analysis.py"
      what: |
        Pearson correlation between numeric variables in daily_aggregated.csv.
        Key pairs tested:
        - Temperature_°C vs Cold_Brew_Quantity
        - Temperature_°C vs Hot_Beverage_Quantity
        - Daily_Footfall vs Total_Revenue
        - Is_Weekend vs Premium_Item_Revenue
      method: "scipy.stats.pearsonr — returns r and p-value"
      output: "data/data_analysis/correlation_matrix.csv + heatmap chart"
      key_findings:
        temperature_cold_brew: "r = +0.74 (strong positive) — hot day, more cold brew"
        temperature_hot_beverage: "r = -0.68 (strong negative) — hot day, less chai"
        footfall_revenue: "r = +0.81 (very strong) — obvious but validates data quality"
        weekend_premium: "r = +0.61 — weekends drive premium item purchases"
      interview_note: |
        "The temperature vs beverage correlations were the most actionable.
        They directly informed our weather-triggered price recommendation rules."

    price_elasticity_of_demand:
      script: "05_price_elasticity.py"
      what: |
        Classical economics formula applied to simulated demand variation.
        Elasticity = (% change in Quantity) / (% change in Price)
        Since price is static in our data, we simulate price variation by
        comparing demand across weather states and academic periods —
        treating these as natural demand shifts.
      formula: "E = (ΔQ/Q₀) / (ΔP/P₀)"
      implementation: |
        For each item, compare quantity sold in High-Demand vs Low-Demand
        conditions. Assign elasticity coefficient:
        |E| > 1.5 → Highly elastic (price sensitive — discount in low demand)
        0.8 < |E| < 1.5 → Moderately elastic
        |E| < 0.8 → Inelastic (price insensitive — can increase at peak)
      output: "data/data_analysis/elasticity_coefficients.csv"
      key_findings:
        highly_elastic: "Masala Chai, Soups, Ramen Bowls — demand swings with conditions"
        inelastic: "Cappuccino, Classic Pancakes — sell regardless of conditions"
        premium_breakdown: "Fondue inelastic to price but elastic to day type (Failure Story 3)"

    pareto_analysis:
      script: "06_pareto_analysis.py"
      what: "Validate ABC findings with Pareto curve — 80/20 rule check"
      implementation: "Cumulative revenue % plotted against item count %"
      output: "Pareto chart PNG + validation CSV"
      finding: "Top 20% of items (40 items) generate 71% of revenue — Pareto holds"

    time_series_decomposition:
      script: "07_time_series.py"
      what: |
        Decompose daily revenue into three components:
        - Trend: Overall revenue direction across 92 days
        - Seasonality: Weekly repeating pattern (Mon–Sun cycle)
        - Residual: Unexplained variation (weather events, OOS)
      method: "statsmodels.tsa.seasonal.seasonal_decompose — additive model"
      period: 7
      output: "data/data_analysis/time_series_decomposed.csv + 4-panel chart"
      key_findings:
        trend: "June dip (monsoon onset) clearly visible. July recovery as college returns."
        seasonality: "Friday–Saturday spike consistent every week. Monday trough consistent."
        residual: "Out-of-stock days visible as negative spikes in residual component"

    demand_segmentation_2x2:
      script: "08_demand_segmentation.py"
      what: |
        Place every item-slot combination into a 2x2 demand matrix:

        HIGH DEMAND + HIGH ELASTICITY → Dynamic Pricing Target
          Increase price at peak. Discount at trough.

        HIGH DEMAND + LOW ELASTICITY → Premium Lock
          Keep price stable or slightly increase. Do not discount.

        LOW DEMAND + HIGH ELASTICITY → Promotional Item
          Aggressive discounting or bundling to stimulate.

        LOW DEMAND + LOW ELASTICITY → Review Item
          Possibly remove from menu or reposition.
      axes:
        x_axis: "Demand level — median daily quantity sold"
        y_axis: "Elasticity coefficient — from elasticity script"
      output: "data/data_analysis/demand_segments.csv + 2x2 scatter plot"
      key_classifications:
        dynamic_pricing_targets: "Iced Café Latte, Grilled Chicken Burger, Margherita Pizza"
        premium_lock: "Cappuccino, Classic Pancakes, Caesar Salad"
        promotional: "Burmese Khow-suey, Greek-O-Greek Pizza, Pho"
        review_items: "Espresso On The Rocks, BGCLS Juice, Set Cheesecake"

    descriptive_statistics_python:
      script: "01_data_loader.py (extended section)"
      what: "Full describe() output per category, skewness, kurtosis of Revenue_₹"
      library: "pandas describe(), scipy.stats.skew(), scipy.stats.kurtosis()"
      output: "Printed summary + saved to daily_aggregated.csv"


# ============================================================================
# PART VII: PHASE 3 — MACHINE LEARNING
# ============================================================================

phase_3_machine_learning:
  duration: "Week 5–6"
  objective: "Train demand forecasting model, generate price recommendations, quantify uplift"
  tools: "scikit-learn, pandas, numpy, joblib, matplotlib"
  input: "data/data_analysis/ (all CSVs) + data/obs/ Item_Master (reference)"

  model_1_demand_forecasting:
    script: "02_demand_forecast.py"
    target_variable: "Quantity_Units (demand proxy)"
    problem_type: "Regression"

    feature_set:
      - "Month_encoded (0/1/2)"
      - "Day_of_Week_encoded (0–6)"
      - "Is_Weekend (0/1)"
      - "Time_Slot_Morning (one-hot)"
      - "Time_Slot_Afternoon (one-hot)"
      - "Time_Slot_Evening (one-hot)"
      - "Time_Slot_Dinner (one-hot)"
      - "Weather_DryDay (one-hot)"
      - "Weather_LightDrizzle (one-hot)"
      - "Weather_HeavyRain (one-hot)"
      - "Weather_ClearAfterRain (one-hot)"
      - "Temperature_°C"
      - "Daily_Footfall_Customers"
      - "Academic_Period_encoded (0/1/2)"
      - "Customer_Segment_College (one-hot)"
      - "Customer_Segment_Professional (one-hot)"
      - "Customer_Segment_CoupleGroup (one-hot)"
      - "Customer_Segment_Family (one-hot)"
      - "Category_encoded"
      - "Price_Tier_encoded (0/1/2)"
      - "Base_Price_₹"
      - "Is_Vegetarian (0/1)"

    train_test_split:
      method: "Chronological split — NOT random"
      train: "May 01 – July 15 (75 days)"
      test: "July 16 – July 31 (16 days)"
      rationale: |
        Random split would leak future information into training.
        A café pricing model must generalise to future dates, not random
        past dates. Chronological split is the correct real-world approach.

    model_a_linear_regression:
      algorithm: "sklearn.linear_model.LinearRegression"
      purpose: "Baseline — always start simple before adding complexity"
      evaluation:
        MAE: "~0.31 units (expected)"
        RMSE: "~0.44 units (expected)"
      note: "Intentionally underperforms RF — demonstrates value of ensemble methods"

    model_b_random_forest:
      algorithm: "sklearn.ensemble.RandomForestRegressor"
      hyperparameters:
        n_estimators: 200
        max_depth: 12
        min_samples_split: 5
        min_samples_leaf: 3
        random_state: 42
      evaluation:
        MAE: "~0.22 units (expected)"
        RMSE: "~0.31 units (expected)"
        cross_val_score: "5-fold CV on training set"
      feature_importance: "Plotted as horizontal bar chart — Weather + Time_Slot dominate"
      serialization: "joblib.dump(rf_model, 'data/models/rf_demand_model.pkl')"

    overfitting_handling:
      detection: "Train RMSE significantly lower than test RMSE in initial run"
      fix_applied: "Increase min_samples_leaf from 1 to 3, max_depth from None to 12"
      validation: "5-fold cross-validation confirms generalisation"
      note: "This is Failure Story 2 — documented in companion.md"

  model_2_price_recommender:
    script: "03_price_recommender.py"
    what: |
      Rule-based optimization layer on top of Random Forest demand predictions.
      NOT a second ML model — this is intentional. The café owner must be able
      to understand and override any recommendation.
    logic: |
      For each item × time_slot × day_type combination:

        predicted_demand = rf_model.predict(features)
        elasticity = elasticity_coefficients[item]
        base_price = item_master[item]['Base_Price']

        if predicted_demand > HIGH_DEMAND_THRESHOLD:
            # Peak hour — can increase price
            price_increase_pct = min(elasticity * 0.08, 0.15)  # max 15% increase
            recommended_price = base_price * (1 + price_increase_pct)

        elif predicted_demand < LOW_DEMAND_THRESHOLD:
            # Off-peak — stimulate with discount
            price_decrease_pct = min(elasticity * 0.06, 0.12)  # max 12% decrease
            recommended_price = base_price * (1 - price_decrease_pct)

        else:
            recommended_price = base_price  # no change in normal demand

        # PRICE FLOOR CONSTRAINT (Failure Story 3)
        floor_price = base_price * 0.85
        recommended_price = max(recommended_price, floor_price)

        # PREMIUM HUMAN REVIEW FLAG
        if price_tier == 'Premium':
            flag = 'REVIEW_REQUIRED'
    output: "data/models/price_recommendations.csv"
    columns_output:
      - "Item_Name"
      - "Category"
      - "Time_Slot"
      - "Day_Type (Weekday / Weekend)"
      - "Weather_State"
      - "Base_Price_₹"
      - "Recommended_Price_₹"
      - "Price_Change_%"
      - "Predicted_Demand_Units"
      - "Demand_Class (High/Normal/Low)"
      - "Review_Flag"

  model_3_revenue_comparison:
    script: "04_revenue_comparison.py"
    what: |
      Simulate revenue under static pricing vs dynamic pricing on the test set.
      This is the headline result — the number you lead with in every interview.
    method: |
      Static Revenue = SUM(Base_Price_₹ × Quantity_Units) on test set
      Dynamic Revenue = SUM(Recommended_Price_₹ × Quantity_Units) on test set
      Uplift % = (Dynamic - Static) / Static × 100
    output: "data/reports/revenue_uplift_analysis.csv"
    expected_uplift: "8–14% (realistic range for classical ML on café data)"
    breakdown_by:
      - "Uplift by Category"
      - "Uplift by Time_Slot"
      - "Uplift by Weather_State"
      - "Uplift by Day_Type"

  model_evaluation:
    script: "05_model_evaluation.py"
    metrics:
      regression_metrics:
        MAE: "Mean Absolute Error — average prediction error in units"
        RMSE: "Root Mean Squared Error — penalises large errors more"
        R_squared: "Proportion of demand variance explained by model"
      business_metric:
        revenue_uplift_pct: "Primary metric — what the café actually cares about"
      validation:
        cross_validation: "5-fold CV — sklearn.model_selection.cross_val_score"
        learning_curve: "Train vs validation score across training set sizes"
    charts_produced:
      - "Feature importance horizontal bar (RF)"
      - "Actual vs Predicted scatter plot"
      - "Residual plot"
      - "Learning curve (train vs CV score)"
      - "Revenue uplift waterfall chart by category"


