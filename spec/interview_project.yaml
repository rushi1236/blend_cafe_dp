# ============================================================================
# PART IX: LIMITATIONS AND FUTURE WORK
# ============================================================================

limitations_and_future_work:
  current_limitations:
    simulated_data: |
      All data is simulated. Real café data would include payment method,
      group size, repeat customer behaviour, staff shifts, kitchen capacity
      constraints, and actual competitor pricing. Simulation captures macro
      patterns but misses micro-level noise.
    static_competitor_pricing: |
      No competitor data included. FC Road has many cafés. Real dynamic
      pricing must account for what competitors charge for comparable items.
    no_capacity_constraint: |
      Model does not account for kitchen throughput. Increasing price on
      5 items simultaneously during Saturday Dinner may not be operationally
      feasible if kitchen is already at capacity.
    segment_inference: |
      Customer_Segment is simulated — not observed. A real POS system
      with loyalty programme data or order history would give actual
      segment identification.

  future_work:
    with_3_more_months:
      - "Real transaction data collection via POS integration"
      - "A/B test price recommendations on subset of menu items"
      - "Build weekend vs weekday separate models"
      - "Incorporate competitor pricing as feature"
    with_6_more_months:
      - "Gradient Boosting (XGBoost) for demand forecasting"
      - "Recommendation system for item bundling (what to suggest with Fondue)"
      - "Automated pricing dashboard for café manager"
    if_deep_learning_allowed:
      - "LSTM for time series demand forecasting with longer history"
      - "Contextual bandits for real-time price optimisation"
      note: "Explicitly excluded from current scope — classical ML sufficient and more explainable"


